<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePark India - Smart Parking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-sizing: border-box; }
        @media (min-width: 500px) { body { padding: 20px 0; } .container { margin-top: 20px; margin-bottom: 20px; min-height: auto; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); } .copyright { border-radius: 0 0 16px 16px; } }
        .btn { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background-color 0.2s; }
        .btn:active { opacity: 0.9; }
        .btn-primary { background-color: #f97316; }
        .btn-call { background-color: #16a34a; }
        .btn-secondary { background-color: #64748b; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f9fafb; }
        input:focus { border-color: #f97316; outline: none; background: white; }
        label { font-size: 13px; font-weight: 600; color: #374151; margin-top: 12px; display: block; }
        .logo-img { width: 80px; height: 80px; margin: 0 auto; display: block; border-radius: 16px; object-fit: cover; }
        .copyright { text-align: center; font-size: 11px; color: #9ca3af; padding: 15px 10px; background: #f9fafb; border-top: 1px solid #f1f5f9; }
        .copyright a { color: #f97316; text-decoration: none; font-weight: bold; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-top: 8px; text-align: left; }
        .info-label { font-size: 11px; color: #64748b; }
        .info-value { font-size: 15px; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

<div class="container p-5" id="app">
    <!-- App Content Loads Here -->
</div>

<script>
    // --- UTILITIES ---
    function encodeData(obj) { return btoa(encodeURIComponent(JSON.stringify(obj))); }
    function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

    // --- CONFIGURATION ---
    const LOGO_URL = "./logo.png";
    const COPYRIGHT_HTML = `<a href="https://www.theprojectwala.com" target="_blank">© The Project Wala</a>`;
    
    // YOUR NEW DATABASE URL
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxB79pHLWSpmQrqSt0jK30FRZS6FKSi4QK03QUiBZK1NscEns0vqmmmlJAxbOrgrS4uyA/exec"; 
    
    const AUTH_ID = "ceosafeparkindia";
    const AUTH_PASS = "Safeparkdb@007"; // NEW PASSWORD

    // --- ROUTER ---
    function router() {
        const params = new URLSearchParams(window.location.search);
        const carId = params.get('id');
        const pageParam = params.get('page');

        if (carId) {
            fetchCarData(carId);
        } else if (pageParam === 'about') {
            showAboutPage();
        } else {
            showLandingPage();
        }
    }

    // --- FETCH DATA ---
    function fetchCarData(carId) {
        document.getElementById('app').innerHTML = `<div class="text-center pt-20"><p class="text-gray-500">🔒 Securely connecting...</p></div>`;
        fetch(DATABASE_URL + "?id=" + carId)
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    showScannerPage(carId, result.data);
                } else {
                    showErrorPage();
                }
            })
            .catch(() => showErrorPage());
    }

    // --- PAGE: ABOUT US (NEW DETAILED VERSION) ---
    function showAboutPage() {
        document.getElementById('app').innerHTML = `
             <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-gray-800 mt-3">About SafePark India</h1>
                <p class="text-orange-500 font-semibold text-sm mt-1">A Flagship Initiative by The Project Wala</p>
            </div>
            
            <div class="mt-5 text-gray-700 text-sm leading-relaxed space-y-4">
                
                <div>
                    <h3 class="font-bold text-blue-800 text-base mb-1">🚀 Our Vision</h3>
                    <p class="text-gray-600 text-justify">
                        SafePark India is not just an app; it is a movement towards smarter, safer, and more organized cities. We believe that technology should solve everyday problems without compromising personal security. In a rapidly urbanizing India, parking issues often lead to unnecessary conflicts, towing hassles, and lost time. SafePark India aims to eliminate this chaos with a simple scan.
                    </p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border">
                    <h3 class="font-bold text-gray-800 text-base mb-2">📉 The Problem We Solve</h3>
                    <p class="text-gray-600 text-justify mb-2">
                        Every day, thousands of vehicle owners face the dilemma: <i>"Should I write my phone number on the dashboard?"</i>
                    </p>
                    <ul class="list-disc ml-5 text-gray-600 space-y-1">
                        <li><b>Privacy Risk:</b> Writing your number publicly invites spam calls, pranksters, and potential security threats.</li>
                        <li><b>Communication Gap:</b> Without contact info, blocked vehicles cause traffic jams and arguments.</li>
                        <li><b>Inefficiency:</b> Finding the owner of a car with lights left on or a flat tire is impossible.</li>
                    </ul>
                </div>

                <div class="bg-orange-50 p-4 rounded-lg border border-orange-100">
                    <h3 class="font-bold text-orange-800 text-base mb-2">💡 Our Innovative Solution</h3>
                    <p class="text-gray-700 text-justify">
                        Developed by the team at <b>The Project Wala</b>, SafePark India replaces the outdated "paper-and-pen" method with a secure digital QR code. Our technology acts as a privacy shield. When someone scans your code, they can contact you instantly via a secure call or message—but they never see your actual phone number unless you allow it. This ensures that help reaches you when you need it, while keeping your identity safe.
                    </p>
                </div>

                <div>
                    <h3 class="font-bold text-gray-800 text-base mb-2">✨ Key Highlights</h3>
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="bg-blue-50 p-2 rounded">
                            <p class="font-bold text-blue-600">100% Free</p>
                            <p class="text-xs text-gray-500">No subscription fees</p>
                        </div>
                        <div class="bg-green-50 p-2 rounded">
                            <p class="font-bold text-green-600">Privacy First</p>
                            <p class="text-xs text-gray-500">Number masking tech</p>
                        </div>
                        <div class="bg-purple-50 p-2 rounded">
                            <p class="font-bold text-purple-600">Instant Alerts</p>
                            <p class="text-xs text-gray-500">Email notifications</p>
                        </div>
                        <div class="bg-red-50 p-2 rounded">
                            <p class="font-bold text-red-600">Emergency</p>
                            <p class="text-xs text-gray-500">Backup contacts</p>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <p class="text-xs text-center text-gray-500 font-semibold uppercase tracking-wide mb-2">Contact The Team</p>
                    <div class="info-box">
                        <p class="info-label">CEO & Founder</p>
                        <p class="info-value">Mohit Kumar Jha</p>
                    </div>
                    <div class="info-box">
                        <p class="info-label">Support Email</p>
                        <p class="info-value"><a href="mailto:admin@theprojectwala.com" class="text-blue-600">admin@theprojectwala.com</a></p>
                    </div>
                    <div class="info-box">
                        <p class="info-label">Official Website</p>
                        <p class="info-value"><a href="https://www.theprojectwala.com" target="_blank" class="text-blue-600">www.theprojectwala.com</a></p>
                    </div>
                </div>

                <button class="btn btn-secondary mt-2" onclick="window.location.href=window.location.pathname">← Back to Home</button>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    // --- PAGE 1: REGISTRATION ---
    function showLandingPage() {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-gray-800 mt-3">SafePark <span class="text-blue-600">INDIA</span></h1>
                <p class="text-gray-500 text-xs">Generate your parking QR instantly</p>
            </div>
            
            <div class="mt-5 p-4 bg-gray-50 rounded-xl border">
                <label>Your Name</label>
                <input type="text" id="owner_name" placeholder="Rahul Kumar">
                
                <label>Mobile Number</label>
                <input type="tel" id="owner_phone" placeholder="10 Digit Number" maxlength="10">
                
                <label>Email Address (For Alerts)</label>
                <input type="email" id="owner_email" placeholder="you@example.com">
                
                <label>Vehicle Number</label>
                <input type="text" id="vehicle_number" placeholder="MH 01 AB 1234">
                
                <label>Emergency Contact (Optional)</label>
                <input type="text" id="emg_name" placeholder="Relative Name">
                <input type="tel" id="emg_phone" placeholder="Relative Number" class="mt-2">

                <!-- PRIVACY TOGGLE -->
                <div style="background-color: #eff6ff; padding: 10px; border-radius: 8px; margin-top: 15px; border: 1px solid #bfdbfe;">
                    <label style="display: flex; align-items: center; cursor: pointer; margin-top:0;">
                        <input type="checkbox" id="privacy_toggle" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <span style="margin-left: 8px; font-weight: 600; color: #1e40af; font-size: 13px;">Hide My Number (Recommended)</span>
                    </label>
                    <p style="font-size: 11px; color: #3b82f6; margin-top: 4px; margin-left: 26px;">
                        If checked, people must chat with you.
                    </p>
                </div>

                <button class="btn btn-primary" onclick="generateQRCode()">Generate QR Code</button>
            </div>
            
            <div class="text-center mt-4">
                <a href="?page=about" class="text-sm text-blue-600 hover:underline">About Us</a>
            </div>

            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    function generateQRCode() {
        const name = document.getElementById('owner_name').value;
        const phone = document.getElementById('owner_phone').value;
        const email = document.getElementById('owner_email').value;
        const vehicle = document.getElementById('vehicle_number').value;
        const emg_name = document.getElementById('emg_name').value;
        const emg_phone = document.getElementById('emg_phone').value;
        const isPrivate = document.getElementById('privacy_toggle').checked;

        if (!name || !phone || !vehicle || !email) {
            alert("Please fill Name, Phone, Email, and Vehicle Number.");
            return;
        }

        // Generate Random ID
        var carId = "SP" + Math.random().toString(36).substr(2, 6).toUpperCase();

        const payload = {
            id: carId, 
            auth_id: AUTH_ID, 
            auth_pass: AUTH_PASS, 
            name: name, phone: phone, email: email, vehicle: vehicle,
            emg_name: emg_name, emg_phone: emg_phone,
            show_number: isPrivate ? "No" : "Yes"
        };

        // Send data to database
        fetch(DATABASE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const currentUrl = window.location.origin + window.location.pathname;
        const scanUrl = `${currentUrl}?id=${carId}`;
        
        showDashboard(scanUrl, {v: vehicle});
    }

    // --- PAGE 2: DASHBOARD ---
    function showDashboard(url, data) {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-5">
                <img src="${LOGO_URL}" alt="Logo" class="w-12 h-12 mx-auto rounded-xl" onerror="this.style.display='none'">
                <h2 class="text-xl font-bold text-gray-800 mt-2">✅ QR Generated!</h2>
                <p class="text-gray-500 text-xs">Vehicle: <span class="font-bold text-blue-700">${data.v}</span></p>
            </div>
            
            <div class="bg-white p-4 rounded-xl mt-4 text-center border-2 border-orange-200">
                <p class="font-semibold text-gray-700 mb-2 text-sm">Your QR Code</p>
                <div id="qrcode" class="flex justify-center p-2 inline-block mt-1 bg-white"></div>
                <p class="text-xs text-gray-500 mt-2 font-medium">Scan to connect with the owner</p>
            </div>

            <div class="mt-3 bg-blue-50 p-3 rounded-lg text-xs text-blue-800">
                <p class="font-bold">Instructions:</p>
                <ol class="list-decimal ml-4 mt-1 space-y-1">
                    <li>Take a screenshot of the QR code.</li>
                    <li>Print it and stick on windshield.</li>
                </ol>
            </div>
            <button class="btn" style="background-color: #000;" onclick="window.print()">🖨️ Print / Save PDF</button>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;

        new QRCode(document.getElementById("qrcode"), { text: url, width: 160, height: 160 });
    }

    // --- PAGE 3: SCANNER VIEW (HYBRID) ---
    function showScannerPage(carId, data) {
        const canCall = data.phone && data.phone.length > 0;

        let callButtonHtml = '';
        if(canCall) {
            callButtonHtml = `
                <a href="tel:${data.phone}" style="text-decoration: none;">
                    <button class="btn btn-call" style="font-size: 16px;">📞 Call Owner</button>
                </a>
                <p class="text-xs text-center text-gray-400 mt-1 mb-2">OR send a message below</p>
            `;
        } else {
             callButtonHtml = `
                <div style="background-color: #f3f4f6; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 10px;">
                    <p style="color: #6b7280; font-size: 12px;">🔒 Owner prefers <b>Private Mode</b>.</p>
                </div>
            `;
        }

        document.getElementById('app').innerHTML = `
            <div class="text-center pt-8">
                <img src="${LOGO_URL}" alt="Logo" class="w-14 h-14 mx-auto rounded-xl shadow-sm" onerror="this.style.display='none'">
                <h2 class="text-xl font-bold text-gray-800 mt-3">🚗 Vehicle Alert</h2>
                <p class="text-gray-500 text-xs mt-1">You are contacting the owner of:</p>
                <div style="background-color: #eff6ff; border: 1px solid #dbeafe; color: #1d4ed8; padding: 10px; border-radius: 8px; display: inline-block; margin-top: 5px; font-family: monospace; font-weight: bold; font-size: 18px;">
                    ${data.vehicle}
                </div>
            </div>

            <div class="mt-4 p-4">
                ${callButtonHtml}

                <label class="text-xs font-semibold text-gray-700">Send a Message:</label>
                <textarea id="msg_box" rows="2" placeholder="Please move your car..." style="width: 100%; padding: 8px; border: 1px solid #e5e7eb; border-radius: 6px; margin-top: 4px; font-size: 14px;"></textarea>
                
                <button class="btn" style="background-color: #2563eb;" onclick="sendMessage('${carId}')">📨 Send Message</button>

                ${data.emg_phone ? `
                <div class="border-t pt-4 mt-4">
                    <p class="text-xs text-center text-gray-500 mb-2">⚠️ Unable to reach owner?</p>
                    <a href="tel:${data.emg_phone}" class="block w-full">
                        <button class="btn bg-orange-500 hover:bg-orange-600">🆘 Call Emergency (${data.emg_name})</button>
                    </a>
                </div>
                ` : ''}
            </div>

            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    function sendMessage(carId) {
        const msg = document.getElementById('msg_box').value;
        if(!msg) { alert("Please type a message."); return; }
        
        const url = DATABASE_URL + "?id=" + carId + "&action=message&msg=" + encodeURIComponent(msg);
        
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-20">
                <div style="font-size: 40px;">✅</div>
                <h2 class="text-xl font-bold text-green-600 mt-3">Message Sent!</h2>
                <p class="text-gray-500 mt-2 text-sm">The owner has been notified via Email.</p>
            </div>
        `;
        fetch(url).catch(err => console.log(err));
    }

    function showErrorPage() {
        document.getElementById('app').innerHTML = `
            <div class="p-6 text-center">
                <h2 class="text-xl text-red-500 font-bold mt-4">⚠️ Invalid Code</h2>
                <p class="mt-2 text-gray-500 text-sm">This QR code seems to be broken or invalid.</p>
                <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
            </div>
        `;
    }

    // Start
    router();

</script>
</body>
</html>
