<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePark India - Smart Parking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        
        /* Container Styling - REDUCED WIDTH */
        .container { 
            max-width: 380px; /* Narrower width */
            margin: 0 auto; 
            background: white; 
            min-height: 100vh; 
            position: relative; 
            box-sizing: border-box; 
        }

        /* Desktop View: Floating Card */
        @media (min-width: 450px) {
            body { padding: 20px 0; }
            .container {
                margin-top: 20px;
                margin-bottom: 20px;
                min-height: auto; 
                border-radius: 20px; 
                box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            } 
            .copyright { border-radius: 0 0 20px 20px; }
        }

        .btn { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        .btn:active { opacity: 0.9; }
        .btn-primary { background-color: #f97316; }
        .btn-call { background-color: #16a34a; }
        .btn-secondary { background-color: #64748b; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #f9fafb; }
        input:focus { border-color: #f97316; outline: none; background: white; }
        label { font-size: 12px; font-weight: 600; color: #374151; margin-top: 10px; display: block; }
        .logo-img { width: 70px; height: 70px; margin: 0 auto; display: block; border-radius: 16px; object-fit: cover; }
        .copyright { text-align: center; font-size: 10px; color: #9ca3af; padding: 12px 10px; background: #f9fafb; border-top: 1px solid #f1f5f9; }
        .copyright a { color: #f97316; text-decoration: none; font-weight: bold; margin: 0 4px; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-top: 6px; text-align: left; }
        .info-label { font-size: 10px; color: #64748b; }
        .info-value { font-size: 14px; font-weight: 600; color: #1e293b; }
        .toggle-box { background-color: #eff6ff; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #bfdbfe; }
        .toggle-label { display: flex; align-items: center; cursor: pointer; }
        .toggle-label input { width: 16px; height: 16px; cursor: pointer; margin: 0; }
        .toggle-text { margin-left: 8px; font-weight: 600; color: #1e40af; font-size: 12px; }
        .toggle-desc { font-size: 10px; color: #3b82f6; margin-top: 2px; margin-left: 24px; }
        .section-divider { border-top: 1px dashed #cbd5e1; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container p-4" id="app">
    <!-- App Content Loads Here -->
</div>

<script>
    // --- UTILITIES ---
    function encodeData(obj) { return btoa(encodeURIComponent(JSON.stringify(obj))); }
    function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

    // --- CONFIGURATION ---
    const LOGO_URL = "./logo.png";
    const DONATION_QR = "./qr.png"; 
    const COPYRIGHT_HTML = `<a href="https://www.theprojectwala.com" target="_blank">© The Project Wala</a> | <a href="?page=terms">T&C</a>`;
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbznD4u1al9VRoJYPejj3_RiMlvrYoZuzaHLgNvwesUYoKHCJkYvayXfApMCFAZxZomp/exec"; 
    const AUTH_ID = "ceosafeparkindia";
    const AUTH_PASS = "Safeparkdb@007"; 

    // --- ROUTER ---
    function router() {
        const params = new URLSearchParams(window.location.search);
        const carId = params.get('id');
        const pageParam = params.get('page');

        if (carId) {
            fetchCarData(carId);
        } else if (pageParam === 'about') {
            showAboutPage();
        } else if (pageParam === 'terms') {
            showTermsPage(); 
        } else {
            showLandingPage();
        }
    }

    // --- FETCH DATA ---
    function fetchCarData(carId) {
        document.getElementById('app').innerHTML = `<div class="text-center pt-20"><p class="text-gray-500">🔒 Securely connecting...</p></div>`;
        fetch(DATABASE_URL + "?id=" + carId)
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    showScannerPage(carId, result.data);
                } else {
                    showErrorPage();
                }
            })
            .catch(() => showErrorPage());
    }

    // --- PAGE: TERMS AND CONDITIONS ---
    function showTermsPage() {
        document.getElementById('app').innerHTML = `
             <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold text-gray-800 mt-3">Terms & Conditions</h1>
            </div>
            <div class="mt-4 text-gray-700 text-xs leading-relaxed space-y-3 text-justify">
                <div class="bg-red-50 border border-red-200 p-3 rounded-lg">
                    <h3 class="font-bold text-red-700 mb-1">⚠️ DISCLAIMER</h3>
                    <p class="text-red-800 font-semibold">SAFE PARK INDIA PROVIDES THIS SERVICE "AS IS". WE ARE NOT RESPONSIBLE FOR ANY DAMAGES OR CLAIMS.</p>
                </div>
                <div><h3 class="font-bold text-gray-800 mb-1">1. Acceptance</h3><p class="text-gray-600">By using this Service, you agree to these Terms.</p></div>
                <div><h3 class="font-bold text-gray-800 mb-1">2. No Emergency Service</h3><p class="text-gray-600">This is not a substitute for emergency services. Contact authorities directly for accidents.</p></div>
                <div><h3 class="font-bold text-gray-800 mb-1">3. Limitation of Liability</h3><p class="text-gray-600">The Project Wala and its owner shall not be liable for any damages arising from the use of this service.</p></div>
                <button class="btn btn-secondary mt-4" onclick="window.location.href=window.location.pathname">← Back</button>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    // --- PAGE: ABOUT US (LENGTHY) ---
    function showAboutPage() {
        document.getElementById('app').innerHTML = `
             <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold text-gray-800 mt-3">About SafePark India</h1>
                <p class="text-orange-500 font-semibold text-xs mt-1">A Flagship Initiative by The Project Wala</p>
            </div>
            
            <div class="mt-4 text-gray-700 text-xs leading-relaxed space-y-3">
                <p class="text-justify"><span class="font-bold text-blue-700">SafePark India</span> is a revolutionary initiative designed to tackle the everyday challenges of parking and vehicle safety in our bustling cities. Born from the innovative minds at <b>The Project Wala</b>, we aim to bridge the communication gap between vehicle owners and the public using smart, accessible technology.</p>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <h3 class="font-bold text-blue-800 mb-1">🚀 Our Vision</h3>
                    <p class="text-gray-600">We envision a future where Indian roads are free of parking disputes and unnecessary traffic jams caused by blocked vehicles. Our goal is to digitize the way drivers communicate, moving away from outdated paper-and-pen methods to a secure, privacy-first digital platform.</p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg border">
                    <h3 class="font-bold text-gray-800 mb-1">📉 The Problem We Solve</h3>
                    <p class="text-gray-600 mb-2">Finding a parking spot is just the beginning. The real trouble starts when:</p>
                    <ul class="list-disc ml-4 text-gray-600 space-y-1">
                        <li><b>Blocked Vehicles:</b> You can't leave because someone parked behind you, and you don't know who they are.</li>
                        <li><b>Privacy Risks:</b> Writing your phone number on the dashboard invites spam calls and potential stalking.</li>
                        <li><b>Emergencies:</b> Lights left on or flat tires go unnoticed because passersby can't reach you.</li>
                    </ul>
                </div>

                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
                    <h3 class="font-bold text-orange-800 mb-1">💡 Our Solution</h3>
                    <p class="text-gray-700 text-justify">SafePark replaces the risk of exposing your number with a secure <b>Smart QR Code</b>. A simple scan allows anyone to contact you instantly via a secure call or message—<b>without ever seeing your personal details</b>. Our technology acts as a privacy shield, ensuring that help reaches you when you need it, while keeping your identity safe.</p>
                </div>

                <div>
                    <h3 class="font-bold text-gray-800 mb-1">✨ Key Features</h3>
                    <div class="grid grid-cols-2 gap-2 text-center mt-2">
                        <div class="bg-blue-50 p-2 rounded"><p class="font-bold text-blue-600 text-xs">Privacy First</p><p class="text-xs text-gray-500">Numbers Hidden</p></div>
                        <div class="bg-green-50 p-2 rounded"><p class="font-bold text-green-600 text-xs">Instant Alerts</p><p class="text-xs text-gray-500">Email Notify</p></div>
                        <div class="bg-purple-50 p-2 rounded"><p class="font-bold text-purple-600 text-xs">Emergency</p><p class="text-xs text-gray-500">Backup Contacts</p></div>
                        <div class="bg-red-50 p-2 rounded"><p class="font-bold text-red-600 text-xs">100% Free</p><p class="text-xs text-gray-500">No Fees</p></div>
                    </div>
                </div>

                <div class="section-divider"></div>

                <div class="info-box"><p class="info-label">CEO & Founder</p><p class="info-value">Mohit Kumar Jha</p></div>
                <div class="info-box"><p class="info-label">Email</p><p class="info-value"><a href="mailto:admin@theprojectwala.com" class="text-blue-600">admin@theprojectwala.com</a></p></div>
                <div class="info-box"><p class="info-label">Website</p><p class="info-value"><a href="https://www.theprojectwala.com" target="_blank" class="text-blue-600">www.theprojectwala.com</a></p></div>

                <!-- DONATION SECTION -->
                <div class="p-4 bg-green-50 rounded-xl border border-green-200 text-center mt-4">
                    <h3 class="font-bold text-green-700 text-sm">💖 Support Our Mission</h3>
                    <p class="text-gray-500 text-xs mt-1 mb-3">Scan to donate and help us grow.</p>
                    <img src="${DONATION_QR}" alt="Donate QR" style="width: 140px; height: 160px; margin: 0 auto; display: block; border-radius: 8px; border: 1px solid #e5e7eb;" onerror="this.style.display='none'">
                </div>

                <button class="btn btn-secondary" onclick="window.location.href=window.location.pathname">← Back to Home</button>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    // --- PAGE 1: REGISTRATION ---
    function showLandingPage() {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold text-gray-800 mt-3">SafePark <span class="text-blue-600">INDIA</span></h1>
                <p class="text-gray-500 text-xs">Generate your parking QR instantly</p>
            </div>
            
            <div class="mt-4 p-3 bg-gray-50 rounded-xl border">
                <label>Your Name</label>
                <input type="text" id="owner_name" placeholder="Rahul Kumar">
                
                <label>Mobile Number</label>
                <input type="tel" id="owner_phone" placeholder="10 Digit Number" maxlength="10">
                
                <label>Email Address (For Alerts)</label>
                <input type="email" id="owner_email" placeholder="you@example.com">
                
                <label>Vehicle Number</label>
                <input type="text" id="vehicle_number" placeholder="MH 01 AB 1234">
                
                <hr class="my-3 border-gray-200">
                <p class="text-xs font-bold text-gray-500 uppercase">Emergency Contact (Optional)</p>

                <label>Emergency Contact Name</label>
                <input type="text" id="emg_name" placeholder="Relative Name">

                <label>Emergency Contact Phone</label>
                <input type="tel" id="emg_phone" placeholder="Relative Number">

                <label>Emergency Contact Email</label>
                <input type="email" id="emg_email" placeholder="relative@example.com">

                <div class="toggle-box">
                    <label class="toggle-label">
                        <input type="checkbox" id="privacy_toggle" checked>
                        <span class="toggle-text">Hide My Number</span>
                    </label>
                    <p class="toggle-desc">Recommended. People must chat with you.</p>
                </div>

                <div class="toggle-box" style="background-color: #fef3c7; border-color: #fcd34d;">
                    <label class="toggle-label">
                        <input type="checkbox" id="privacy_emg_toggle" checked>
                        <span class="toggle-text" style="color: #92400e;">Hide Emergency Number</span>
                    </label>
                    <p class="toggle-desc" style="color: #b45309;">Scanner cannot call, only email.</p>
                </div>

                <button class="btn btn-primary mt-3" onclick="generateQRCode()">Generate QR Code</button>
            </div>
            
            <div class="text-center mt-3">
                <a href="?page=about" class="text-xs text-blue-600 hover:underline">About Us</a>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    function generateQRCode() {
        const name = document.getElementById('owner_name').value;
        const phone = document.getElementById('owner_phone').value;
        const email = document.getElementById('owner_email').value;
        const vehicle = document.getElementById('vehicle_number').value;
        const emg_name = document.getElementById('emg_name').value;
        const emg_phone = document.getElementById('emg_phone').value;
        const emg_email = document.getElementById('emg_email').value; 

        const isPrivate = document.getElementById('privacy_toggle').checked;
        const isEmgPrivate = document.getElementById('privacy_emg_toggle').checked;

        if (!name || !phone || !vehicle || !email) {
            alert("Please fill Name, Phone, Email, and Vehicle Number.");
            return;
        }

        var carId = "SP" + Math.random().toString(36).substr(2, 6).toUpperCase();

        const payload = {
            id: carId, 
            auth_id: AUTH_ID, 
            auth_pass: AUTH_PASS, 
            name: name, phone: phone, email: email, vehicle: vehicle,
            emg_name: emg_name, emg_phone: emg_phone, emg_email: emg_email,
            show_number: isPrivate ? "No" : "Yes",
            show_emg_number: isEmgPrivate ? "No" : "Yes"
        };

        fetch(DATABASE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const currentUrl = window.location.origin + window.location.pathname;
        const scanUrl = `${currentUrl}?id=${carId}`;
        
        showDashboard(scanUrl, {v: vehicle});
    }

    // --- PAGE 2: DASHBOARD ---
    function showDashboard(url, data) {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-5">
                <img src="${LOGO_URL}" alt="Logo" class="w-10 h-10 mx-auto rounded-xl" onerror="this.style.display='none'">
                <h2 class="text-lg font-bold text-gray-800 mt-2">✅ QR Generated!</h2>
                <p class="text-gray-500 text-xs">Vehicle: <span class="font-bold text-blue-700">${data.v}</span></p>
            </div>
            
            <div class="bg-white p-4 rounded-xl mt-3 text-center border-2 border-orange-200">
                <p class="font-semibold text-gray-700 mb-1 text-xs">Your QR Code</p>
                <div id="qrcode" class="flex justify-center p-2 inline-block mt-1 bg-white"></div>
                <p class="text-xs text-gray-500 mt-2 font-medium">Scan to connect</p>
            </div>

            <div class="mt-3 bg-blue-50 p-3 rounded-lg text-xs text-blue-800">
                <p class="font-bold">Instructions:</p>
                <ol class="list-decimal ml-4 mt-1 space-y-1">
                    <li>Take a screenshot of the QR code.</li>
                    <li>Print it and stick on windshield.</li>
                </ol>
            </div>
            <button class="btn" style="background-color: #000;" onclick="window.print()">🖨️ Print / Save PDF</button>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;

        new QRCode(document.getElementById("qrcode"), { text: url, width: 150, height: 150 });
    }

    // --- PAGE 3: SCANNER VIEW (DUAL CHAT BOXES) ---
    function showScannerPage(carId, data) {
        const canCallOwner = data.phone && data.phone.length > 0;
        const canCallEmg = data.emg_phone && data.emg_phone.length > 0;

        let ownerCallHtml = '';
        if(canCallOwner) {
            ownerCallHtml = `<a href="tel:${data.phone}"><button class="btn btn-call">📞 Call Owner</button></a>`;
        } else {
            ownerCallHtml = `<div class="bg-gray-100 p-2 rounded text-center text-xs text-gray-500 mb-2">🔒 Owner number is private.</div>`;
        }

        let emgCallHtml = '';
        if(canCallEmg) {
            emgCallHtml = `<a href="tel:${data.emg_phone}"><button class="btn bg-orange-500 hover:bg-orange-600">🆘 Call Emergency</button></a>`;
        } else if (data.emg_name) {
             emgCallHtml = `<div class="bg-gray-100 p-2 rounded text-center text-xs text-gray-500 mb-2">🔒 Emergency number is private.</div>`;
        }

        document.getElementById('app').innerHTML = `
            <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="w-12 h-12 mx-auto rounded-xl shadow-sm" onerror="this.style.display='none'">
                <h2 class="text-lg font-bold text-gray-800 mt-2">🚗 Vehicle Alert</h2>
                <div style="background-color: #eff6ff; border: 1px solid #dbeafe; color: #1d4ed8; padding: 8px; border-radius: 6px; display: inline-block; margin-top: 5px; font-family: monospace; font-weight: bold; font-size: 16px;">
                    ${data.vehicle}
                </div>
            </div>

            <!-- SECTION 1: CONTACT OWNER -->
            <div class="mt-4 p-3 bg-white rounded-lg border">
                <h3 class="font-bold text-gray-700 text-sm mb-2">👤 Contact Owner: ${data.name}</h3>
                ${ownerCallHtml}
                
                <div class="mt-2">
                    <label class="text-xs font-semibold text-gray-600">Send Message:</label>
                    <textarea id="msg_box_owner" rows="2" placeholder="Please move your car..." style="width: 100%; padding: 6px; border: 1px solid #e5e7eb; border-radius: 4px; margin-top: 2px; font-size: 13px;"></textarea>
                    <button class="btn" style="background-color: #2563eb; font-size: 13px; padding: 8px;" onclick="sendMessage('${carId}', 'owner')">📨 Send to Owner</button>
                </div>
            </div>

            <!-- SECTION 2: CONTACT EMERGENCY -->
            ${data.emg_name ? `
            <div class="mt-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                <h3 class="font-bold text-orange-800 text-sm mb-2">🆘 Emergency: ${data.emg_name}</h3>
                ${emgCallHtml}
                
                <div class="mt-2">
                    <label class="text-xs font-semibold text-orange-700">Send Emergency Message:</label>
                    <textarea id="msg_box_emg" rows="2" placeholder="Urgent help needed..." style="width: 100%; padding: 6px; border: 1px solid #fcd34d; border-radius: 4px; margin-top: 2px; font-size: 13px; background: white;"></textarea>
                    <button class="btn bg-orange-600 hover:bg-orange-700" style="font-size: 13px; padding: 8px;" onclick="sendMessage('${carId}', 'emergency')">📨 Send to Emergency</button>
                </div>
            </div>
            ` : ''}

            <div class="copyright mt-4">${COPYRIGHT_HTML}</div>
        `;
    }

    // Updated to handle target (owner/emergency)
    function sendMessage(carId, target) {
        let msgId = target === 'emergency' ? 'msg_box_emg' : 'msg_box_owner';
        const msg = document.getElementById(msgId).value;
        
        if(!msg) { alert("Please type a message."); return; }
        
        const url = DATABASE_URL + "?id=" + carId + "&action=message&target=" + target + "&msg=" + encodeURIComponent(msg);
        
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-20">
                <div style="font-size: 40px;">✅</div>
                <h2 class="text-lg font-bold text-green-600 mt-3">Message Sent!</h2>
                <p class="text-gray-500 mt-2 text-xs">The ${target} has been notified via Email.</p>
            </div>
        `;
        fetch(url).catch(err => console.log(err));
    }

    function showErrorPage() {
        document.getElementById('app').innerHTML = `
            <div class="p-6 text-center">
                <h2 class="text-lg text-red-500 font-bold mt-4">⚠️ Invalid Code</h2>
                <p class="mt-2 text-gray-500 text-xs">This QR code is invalid.</p>
                <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
            </div>
        `;
    }

    // Start
    router();

</script>
</body>
</html>
