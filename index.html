<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePark India - Smart Parking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); padding-bottom: 20px; }
        .btn { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #f97316; }
        .btn-call { background-color: #16a34a; }
        .btn-secondary { background-color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #f97316; outline: none; }
        label { font-size: 14px; font-weight: 600; color: #475569; margin-top: 20px; display: block; }
        .logo-img { width: 90px; height: 90px; margin: 0 auto; display: block; border-radius: 20px; object-fit: cover; }
        .copyright { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 30px; padding: 10px; }
        .copyright a { color: #f97316; text-decoration: none; font-weight: bold; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-top: 10px; text-align: left; }
        .info-label { font-size: 12px; color: #64748b; }
        .info-value { font-size: 16px; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

<div class="container p-6" id="app">
    <!-- App Content Loads Here -->
</div>

<script>
    // --- UTILITIES ---
    function encodeData(obj) { return btoa(encodeURIComponent(JSON.stringify(obj))); }
    function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

    // --- CONFIGURATION ---
    const LOGO_URL = "./logo.png";
    const COPYRIGHT_HTML = `<a href="https://www.theprojectwala.com" target="_blank">© The Project Wala</a>`;
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbx9sjVXHurTFbJWG0WGNlEQ4f7t4ZZmRs9jz4V-Yt9zEd2v-CHtVdM_pwpRe2CxgAMayw/exec";
    const AUTH_ID = "ceosafeparkindia";
    const AUTH_PASS = "Original@007";

    // --- ROUTER ---
    function router() {
        const params = new URLSearchParams(window.location.search);
        const carId = params.get('id');
        const pageParam = params.get('page');

        if (carId) {
            fetchCarData(carId);
        } else if (pageParam === 'about') {
            showAboutPage();
        } else {
            showLandingPage();
        }
    }

    // --- FETCH DATA ---
    function fetchCarData(carId) {
        document.getElementById('app').innerHTML = `<div class="text-center pt-20"><p class="text-gray-500">🔒 Securely connecting...</p></div>`;
        fetch(DATABASE_URL + "?id=" + carId)
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    showScannerPage(carId, result.data);
                } else {
                    showErrorPage();
                }
            })
            .catch(() => showErrorPage());
    }

    // --- PAGE: ABOUT US (DETAILED) ---
    function showAboutPage() {
        document.getElementById('app').innerHTML = `
             <div class="text-center pt-8">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-gray-800 mt-4">About SafePark India</h1>
                <p class="text-orange-500 font-semibold text-sm mt-1">An Initiative of The Project Wala</p>
            </div>
            
            <div class="mt-6 px-2 text-gray-700 text-sm leading-relaxed">
                
                <!-- Introduction -->
                <div class="mb-4">
                    <p class="text-justify">
                        <span class="font-bold text-blue-700">SafePark India</span> is a revolutionary initiative designed to tackle the everyday challenges of parking and vehicle safety in our bustling cities. Born from the innovative minds at <b>The Project Wala</b>, we aim to bridge the communication gap between vehicle owners and the public using smart, accessible technology.
                    </p>
                </div>

                <!-- The Problem -->
                <div class="bg-gray-50 p-3 rounded-lg mb-4">
                    <h3 class="font-bold text-gray-800 mb-1">🚗 The Problem We Solve</h3>
                    <p class="text-gray-600">
                        In India, finding a parking spot is often just the beginning of the struggle. Vehicles blocking driveways, double parking, and abandoned cars cause immense frustration and traffic chaos. Traditionally, people write their phone numbers on the dashboard, but this poses a significant <b>risk to privacy</b>, leading to spam calls and misuse of personal data.
                    </p>
                </div>

                <!-- The Solution -->
                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100 mb-4">
                    <h3 class="font-bold text-orange-800 mb-1">✨ Our Solution</h3>
                    <p class="text-gray-700">
                        SafePark replaces the outdated paper-and-pen method with a secure <b>Smart QR Code</b>. By simply scanning the code placed on the windshield, anyone can instantly contact the vehicle owner for parking issues or emergencies—<b>without ever seeing their actual phone number</b>.
                    </p>
                </div>

                <!-- Key Features -->
                <div class="mb-4">
                    <h3 class="font-bold text-gray-800 mb-2">Key Features:</h3>
                    <ul class="list-disc ml-4 space-y-1 text-gray-600">
                        <li><b>Privacy Protection:</b> Toggle "Private Mode" to hide your number completely and receive secure messages instead.</li>
                        <li><b>Instant Alerts:</b> Get immediate email notifications when someone scans your code.</li>
                        <li><b>Emergency Contacts:</b> Optionally add a secondary contact for critical situations.</li>
                        <li><b>Easy to Use:</b> Generate your QR code in seconds, print it, and stick it on your car.</li>
                    </ul>
                </div>

                <!-- Mission -->
                <div class="text-center mt-6 mb-4">
                    <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Our Mission</p>
                    <p class="text-gray-600 italic mt-1">"To make Indian roads and parking spaces safer, more organized, and respectful of individual privacy."</p>
                </div>

                <!-- Contact Cards -->
                <div class="info-box">
                    <p class="info-label">CEO & Contact Person</p>
                    <p class="info-value">Mohit Kumar Jha</p>
                </div>

                <div class="info-box">
                    <p class="info-label">Email Address</p>
                    <p class="info-value">
                        <a href="mailto:admin@theprojectwala.com" class="text-blue-600 hover:underline">admin@theprojectwala.com</a>
                    </p>
                </div>

                <div class="info-box">
                    <p class="info-label">Official Website</p>
                    <p class="info-value">
                        <a href="https://www.theprojectwala.com" target="_blank" class="text-blue-600 hover:underline">www.theprojectwala.com</a>
                    </p>
                </div>

                <button class="btn btn-secondary mt-6" onclick="window.location.href=window.location.pathname">← Back to Home</button>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    // --- PAGE 1: REGISTRATION (Original Layout + Privacy Toggle) ---
    function showLandingPage() {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-8">
                <img src="${LOGO_URL}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-gray-800 mt-4">SafePark <span class="text-blue-600">INDIA</span></h1>
                <p class="text-gray-500 text-sm">Generate your parking QR instantly</p>
            </div>
            
            <div class="mt-6 p-4 bg-gray-50 rounded-xl border">
                <label>Your Name</label>
                <input type="text" id="owner_name" placeholder="Rahul Kumar">
                
                <label>Mobile Number</label>
                <input type="tel" id="owner_phone" placeholder="10 Digit Number" maxlength="10">
                
                <label>Email Address (For Alerts)</label>
                <input type="email" id="owner_email" placeholder="you@example.com">
                
                <label>Vehicle Number</label>
                <input type="text" id="vehicle_number" placeholder="MH 01 AB 1234">
                
                <label>Emergency Contact (Optional)</label>
                <input type="text" id="emg_name" placeholder="Relative Name">
                <input type="tel" id="emg_phone" placeholder="Relative Number" class="mt-2">

                <!-- PRIVACY TOGGLE -->
                <div style="background-color: #eff6ff; padding: 12px; border-radius: 8px; margin-top: 20px; border: 1px solid #bfdbfe;">
                    <label style="display: flex; align-items: center; cursor: pointer; margin-top:0;">
                        <input type="checkbox" id="privacy_toggle" checked style="width: 20px; height: 20px; cursor: pointer;">
                        <span style="margin-left: 10px; font-weight: 600; color: #1e40af;">Hide My Number (Recommended)</span>
                    </label>
                    <p style="font-size: 12px; color: #3b82f6; margin-top: 5px; margin-left: 30px;">
                        If checked, people must chat with you. If unchecked, they can call you directly.
                    </p>
                </div>

                <button class="btn btn-primary" onclick="generateQRCode()">Generate QR Code</button>
            </div>
            
            <div class="text-center mt-4">
                <a href="?page=about" class="text-sm text-blue-600 hover:underline">About Us</a>
            </div>

            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    function generateQRCode() {
        const name = document.getElementById('owner_name').value;
        const phone = document.getElementById('owner_phone').value;
        const email = document.getElementById('owner_email').value;
        const vehicle = document.getElementById('vehicle_number').value;
        const emg_name = document.getElementById('emg_name').value;
        const emg_phone = document.getElementById('emg_phone').value;
        const isPrivate = document.getElementById('privacy_toggle').checked;

        if (!name || !phone || !vehicle || !email) {
            alert("Please fill Name, Phone, Email, and Vehicle Number.");
            return;
        }

        const payload = {
            auth_id: AUTH_ID, auth_pass: AUTH_PASS,
            name: name, phone: phone, email: email, vehicle: vehicle,
            emg_name: emg_name, emg_phone: emg_phone,
            show_number: isPrivate ? "No" : "Yes"
        };

        // Save to Database
        fetch(DATABASE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // Generate ID logic
        var carId = "SP" + new Date().toISOString().slice(0,19).replace(/[-:T]/g, "").slice(2,10);
        const currentUrl = window.location.origin + window.location.pathname;
        const scanUrl = `${currentUrl}?id=${carId}`;
        
        showDashboard(scanUrl, {v: vehicle});
    }

    // --- PAGE 2: DASHBOARD ---
    function showDashboard(url, data) {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="Logo" class="w-14 h-14 mx-auto rounded-xl" onerror="this.style.display='none'">
                <h2 class="text-xl font-bold text-gray-800 mt-3">✅ QR Generated!</h2>
                <p class="text-gray-500 text-sm">Vehicle: <span class="font-bold text-blue-700">${data.v}</span></p>
            </div>
            
            <div class="bg-white p-6 rounded-xl mt-4 text-center border-2 border-orange-200">
                <p class="font-semibold text-gray-700 mb-2">Your QR Code</p>
                <div id="qrcode" class="flex justify-center p-2 inline-block mt-2 bg-white"></div>
                <p class="text-sm text-gray-600 mt-3 font-medium">Scan to connect with the owner</p>
            </div>

            <div class="mt-4 bg-blue-50 p-4 rounded-lg text-sm text-blue-800">
                <p class="font-bold">Instructions:</p>
                <ol class="list-decimal ml-4 mt-2 space-y-1">
                    <li>Take a screenshot of the QR code.</li>
                    <li>Print it and stick on windshield.</li>
                </ol>
            </div>
            <button class="btn" style="background-color: #000;" onclick="window.print()">🖨️ Print / Save PDF</button>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;

        new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180 });
    }

    // --- PAGE 3: SCANNER VIEW (HYBRID) ---
    function showScannerPage(carId, data) {
        const canCall = data.phone && data.phone.length > 0;

        let callButtonHtml = '';
        if(canCall) {
            callButtonHtml = `
                <a href="tel:${data.phone}" style="text-decoration: none;">
                    <button class="btn btn-call text-lg font-semibold">📞 Call Owner</button>
                </a>
                <p class="text-xs text-center text-gray-400 mt-2 mb-4">OR send a message below</p>
            `;
        } else {
             callButtonHtml = `
                <div style="background-color: #f3f4f6; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px;">
                    <p style="color: #6b7280; font-size: 14px;">🔒 Owner prefers <b>Private Mode</b>. Please send a message.</p>
                </div>
            `;
        }

        document.getElementById('app').innerHTML = `
            <div class="text-center pt-12">
                <img src="${LOGO_URL}" alt="Logo" class="w-16 h-16 mx-auto rounded-xl shadow-sm" onerror="this.style.display='none'">
                <h2 class="text-xl font-bold text-gray-800 mt-4">🚗 Vehicle Alert</h2>
                <p class="text-gray-500 mt-1">You are contacting the owner of:</p>
                <div style="background-color: #eff6ff; border: 1px solid #dbeafe; color: #1d4ed8; padding: 12px 16px; border-radius: 8px; display: inline-block; margin-top: 8px; font-family: monospace; font-weight: bold; font-size: 20px;">
                    ${data.vehicle}
                </div>
            </div>

            <div class="mt-6 space-y-4 p-4">
                ${callButtonHtml}

                <label class="text-sm font-semibold text-gray-700">Send a Message:</label>
                <textarea id="msg_box" rows="2" placeholder="Please move your car..." style="width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 6px; margin-top: 5px;"></textarea>
                
                <button class="btn" style="background-color: #2563eb;" onclick="sendMessage('${carId}')">📨 Send Message</button>

                ${data.emg_phone ? `
                <div class="border-t pt-6 mt-4">
                    <p class="text-sm text-center text-gray-500 mb-3">⚠️ Unable to reach owner?</p>
                    <a href="tel:${data.emg_phone}" class="block w-full">
                        <button class="btn bg-orange-500 hover:bg-orange-600">🆘 Call Emergency (${data.emg_name})</button>
                    </a>
                </div>
                ` : ''}
            </div>

            <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
        `;
    }

    function sendMessage(carId) {
        const msg = document.getElementById('msg_box').value;
        if(!msg) { alert("Please type a message."); return; }
        
        const url = DATABASE_URL + "?id=" + carId + "&action=message&msg=" + encodeURIComponent(msg);
        
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-20">
                <div style="font-size: 40px;">✅</div>
                <h2 class="text-xl font-bold text-green-600 mt-4">Message Sent!</h2>
                <p class="text-gray-500 mt-2">The owner has been notified via Email.</p>
            </div>
        `;
        fetch(url).catch(err => console.log(err));
    }

    function showErrorPage() {
        document.getElementById('app').innerHTML = `
            <div class="p-6 text-center">
                <h2 class="text-xl text-red-500 font-bold mt-4">⚠️ Invalid Code</h2>
                <p class="mt-2 text-gray-500">This QR code seems to be broken or invalid.</p>
                <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
            </div>
        `;
    }

    // Start
    router();

</script>
</body>
</html>
