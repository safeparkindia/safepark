<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePark India - Smart Parking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); padding-bottom: 20px; position: relative; }
        .btn { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #f97316; }
        .btn-call { background-color: #16a34a; }
        .btn-secondary { background-color: #64748b; }
        input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #f97316; outline: none; }
        label { font-size: 14px; font-weight: 600; color: #475569; margin-top: 20px; display: block; }
        .logo-img { width: 90px; height: 90px; margin: 0 auto; display: block; border-radius: 20px; object-fit: cover; }
        .copyright { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 30px; padding: 10px; }
        .copyright a { color: #f97316; text-decoration: none; font-weight: bold; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-top: 10px; text-align: left; }
        .info-label { font-size: 12px; color: #64748b; }
        .info-value { font-size: 16px; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

<div class="container p-6" id="app">
    <!-- App Content Loads Here -->
</div>

<script>
    // --- UTILITIES FOR DATA ENCODING ---
    function encodeData(obj) {
        return btoa(encodeURIComponent(JSON.stringify(obj)));
    }
    function decodeData(str) {
        try {
            return JSON.parse(decodeURIComponent(atob(str)));
        } catch (e) {
            return null;
        }
    }

    // --- CONFIGURATION ---
    const LOGO_URL = "./logo.png";
    
    // Updated Copyright HTML
    const COPYRIGHT_HTML = `<a href="https://www.theprojectwala.com" target="_blank">© The Project Wala</a>`;

    // --- DATABASE & SECURITY CONFIG ---
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbx9sjVXHurTFbJWG0WGNlEQ4f7t4ZZmRs9jz4V-Yt9zEd2v-CHtVdM_pwpRe2CxgAMayw/exec";
    const AUTH_ID = "ceosafeparkindia";
    const AUTH_PASS = "Original@007";

    // --- ROUTER ---
    function router() {
        const params = new URLSearchParams(window.location.search);
        const dataParam = params.get('d');
        const pageParam = params.get('page');

        if (dataParam) {
            const carData = decodeData(dataParam);
            if (carData) {
                showScannerPage(carData);
            } else {
                showErrorPage();
            }
        } else if (pageParam === 'about') {
            showAboutPage();
        } else {
            showLandingPage();
        }
    }

    // --- PAGE: ABOUT US (UPDATED WITH DETAILS) ---
    function showAboutPage() {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-8">
                <img src="${LOGO_URL}" alt="SafePark Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/90?text=SP'">
                <h1 class="text-2xl font-bold text-gray-800 mt-4">About SafePark India</h1>
            </div>
            
            <div class="mt-6 space-y-4">
                
                <!-- About SafePark Section -->
                <div class="bg-orange-50 border border-orange-100 p-4 rounded-lg text-sm text-gray-700">
                    <h3 class="font-bold text-orange-700 mb-2 text-base">Our Mission</h3>
                    <p class="mb-3">SafePark India is a revolutionary initiative designed to solve parking and vehicle safety challenges across the nation. We bridge the communication gap between vehicle owners and the public using smart technology.</p>
                    
                    <h3 class="font-bold text-orange-700 mb-2 text-base">How It Works</h3>
                    <p class="mb-3">By utilizing unique QR codes, we allow citizens to instantly contact vehicle owners in case of emergencies, parking issues, or security alerts—without revealing sensitive personal data. Your privacy is our priority.</p>
                    
                    <h3 class="font-bold text-orange-700 mb-2 text-base">Key Features</h3>
                    <ul class="list-disc ml-4 space-y-1">
                        <li>Instant Notification to Owners</li>
                        <li>Privacy Protection (Number Hidden)</li>
                        <li>Emergency Contact Integration</li>
                        <li>Pan-India Service</li>
                    </ul>
                </div>

                <!-- Contact Details -->
                <div class="info-box">
                    <p class="info-label">CEO</p>
                    <p class="info-value">Mohit Kumar Jha</p>
                </div>

                <div class="info-box">
                    <p class="info-label">Email Address</p>
                    <p class="info-value">
                        <a href="mailto:admin@theprojectwala.com" class="text-blue-600 hover:underline">admin@theprojectwala.com</a>
                    </p>
                </div>

                <div class="info-box">
                    <p class="info-label">Official Website</p>
                    <p class="info-value">
                        <a href="https://www.theprojectwala.com" target="_blank" class="text-blue-600 hover:underline">www.theprojectwala.com</a>
                    </p>
                </div>

                <button class="btn btn-secondary mt-6" onclick="window.location.href=window.location.pathname">← Back to Home</button>
            </div>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    // --- PAGE 1: REGISTRATION ---
    function showLandingPage() {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-8">
                <img src="${LOGO_URL}" alt="SafePark Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/90?text=SP'">
                <h1 class="text-2xl font-bold text-gray-800 mt-4">SafePark <span class="text-blue-600">INDIA</span></h1>
                <p class="text-gray-500 text-sm">Generate your parking QR instantly</p>
            </div>
            
            <div class="mt-6 p-4 bg-gray-50 rounded-xl border">
                <label>Your Name</label>
                <input type="text" id="owner_name" placeholder="Rahul Kumar">
                
                <label>Mobile Number</label>
                <input type="tel" id="owner_phone" placeholder="10 Digit Number" maxlength="10">
                
                <label>Vehicle Number</label>
                <input type="text" id="vehicle_number" placeholder="MH 01 AB 1234">
                
                <label>Emergency Contact (Optional)</label>
                <input type="text" id="emg_name" placeholder="Relative Name">
                <input type="tel" id="emg_phone" placeholder="Relative Number" class="mt-2">

                <button class="btn btn-primary" onclick="generateQRCode()">Generate QR Code</button>
            </div>
            
            <div class="text-center mt-4">
                <a href="?page=about" class="text-sm text-blue-600 hover:underline">About Us</a>
            </div>

            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;
    }

    function generateQRCode() {
        const name = document.getElementById('owner_name').value;
        const phone = document.getElementById('owner_phone').value;
        const vehicle = document.getElementById('vehicle_number').value;
        const emg_name = document.getElementById('emg_name').value;
        const emg_phone = document.getElementById('emg_phone').value;

        if (!name || !phone || !vehicle) {
            alert("Please fill Name, Phone, and Vehicle Number.");
            return;
        }

        const data = { n: name, p: phone, v: vehicle, en: emg_name, ep: emg_phone };
        const encodedString = encodeData(data);
        
        const currentUrl = window.location.origin + window.location.pathname;
        const scanUrl = `${currentUrl}?d=${encodedString}`;

        saveToDatabase(name, phone, vehicle, emg_name, emg_phone);
        
        showDashboard(scanUrl, data);
    }

    // --- DATABASE FUNCTION ---
    function saveToDatabase(name, phone, vehicle, emg_name, emg_phone) {
        const payload = {
            auth_id: AUTH_ID,
            auth_pass: AUTH_PASS,
            name: name,
            phone: phone,
            vehicle: vehicle,
            emg_name: emg_name,
            emg_phone: emg_phone
        };

        fetch(DATABASE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            console.log("Data saved to database successfully.");
        }).catch(error => {
            console.error("Error saving to database:", error);
        });
    }

    // --- PAGE 2: DASHBOARD (SHOW QR) ---
    function showDashboard(url, data) {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-6">
                <img src="${LOGO_URL}" alt="SafePark Logo" class="w-14 h-14 mx-auto rounded-xl">
                <h2 class="text-xl font-bold text-gray-800 mt-3">✅ QR Generated!</h2>
                <p class="text-gray-500 text-sm">Vehicle: <span class="font-bold text-blue-700">${data.v}</span></p>
            </div>
            
            <div class="bg-white p-6 rounded-xl mt-4 text-center border-2 border-orange-200">
                <p class="font-semibold text-gray-700 mb-2">Your QR Code</p>
                <div id="qrcode" class="flex justify-center p-2 inline-block mt-2 bg-white"></div>
                
                <p class="text-sm text-gray-600 mt-3 font-medium">Scan to connect with the owner</p>
            </div>

            <div class="mt-4 bg-blue-50 p-4 rounded-lg text-sm text-blue-800">
                <p class="font-bold">Instructions:</p>
                <ol class="list-decimal ml-4 mt-2 space-y-1">
                    <li>Take a screenshot of the QR code.</li>
                    <li>Print it and stick on windshield.</li>
                </ol>
            </div>
            <button class="btn mt-4" style="background-color: #000;" onclick="window.print()">🖨️ Print / Save PDF</button>
            <div class="copyright">${COPYRIGHT_HTML}</div>
        `;

        new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 180,
            height: 180
        });
    }

    // --- PAGE 3: SCANNER VIEW (PUBLIC) ---
    function showScannerPage(data) {
        document.getElementById('app').innerHTML = `
            <div class="text-center pt-12">
                <img src="${LOGO_URL}" alt="SafePark Logo" class="w-16 h-16 mx-auto rounded-xl shadow-sm">
                <h2 class="text-xl font-bold text-gray-800 mt-4">🚗 Vehicle Alert</h2>
                <p class="text-gray-500 mt-1">You are contacting the owner of:</p>
                <div class="bg-blue-50 border border-blue-100 text-blue-700 px-4 py-3 rounded-lg inline-block mt-2 font-mono font-bold text-xl tracking-wider">
                    ${data.v}
                </div>
            </div>

            <div class="mt-6 space-y-4 p-4">
                <p class="text-sm text-center text-gray-400 mb-4">Tap to connect securely.</p>
                
                <a href="tel:${data.p}" class="block w-full">
                    <button class="btn btn-call text-lg font-semibold">📞 Call Owner (${data.n})</button>
                </a>

                ${data.ep ? `
                <div class="border-t pt-6 mt-4">
                    <p class="text-sm text-center text-gray-500 mb-3">⚠️ Unable to reach owner?</p>
                    <a href="tel:${data.ep}" class="block w-full">
                        <button class="btn bg-orange-500 hover:bg-orange-600">🆘 Call Emergency (${data.en})</button>
                    </a>
                </div>
                ` : ''}

                <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
            </div>
        `;
    }

    function showErrorPage() {
        document.getElementById('app').innerHTML = `
            <div class="p-6 text-center">
                <h2 class="text-xl text-red-500 font-bold mt-4">⚠️ Invalid Code</h2>
                <p class="mt-2 text-gray-500">This QR code seems to be broken or invalid.</p>
                <div class="copyright mt-8">${COPYRIGHT_HTML}</div>
            </div>
        `;
    }

    // Start
    router();

</script>
</body>
</html>
